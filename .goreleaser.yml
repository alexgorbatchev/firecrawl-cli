version: 2

project_name: firecrawl

builds:
  - id: firecrawl
    main: .
    binary: firecrawl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/alexgorbatchev/firecrawl-cli/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
      - AGENTS*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
